events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        listen 443 ssl;
        server_name localhost;

        # Government Grade TLS Validation Paths 
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Document Microservice
        location /api/v1/documents/ {
            proxy_pass http://document_service:8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 50M;
        }

        # Dedicated AI Compute Microservice
        location /api/v1/predict/ {
            proxy_pass http://ai_service:8002/predict/;
        }
        location /api/v1/policy/ {
            proxy_pass http://ai_service:8002/policy/;
        }
        location /api/v1/nlp/ {
            proxy_pass http://ai_service:8002/nlp/;
        }

        # Institution Metadata Microservice
        location /api/v1/institutions/ {
            proxy_pass http://institution_service:8003/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Statistical Dashboard Render Microservice
        location /api/v1/analytics/ {
            proxy_pass http://analytics_service:8004/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Workflow State Machine Microservice
        location /api/v1/workflows/ {
            proxy_pass http://workflow_service:8005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Safe routing to FastAPI core microservice
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Root routing to Next.js frontend
        location / {
            proxy_pass http://frontend:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
